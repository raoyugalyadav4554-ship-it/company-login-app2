<!DOCTYPE html>
<html>
<head>

    <title>Company Login</title>

    <style>

        body{
            margin:0;
            padding:0;
            background:#111827;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial;
        }

        .box{
            background:white;
            padding:40px;
            border-radius:12px;
            width:320px;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:1px solid #ccc;
            border-radius:6px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:16px;
        }

        #message{
            text-align:center;
            margin-top:20px;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>Company Login</h1>

    <input
        type="email"
        id="email"
        placeholder="Enter Email"
    >

    <input
        type="password"
        id="password"
        placeholder="Enter Password"
    >

    <button onclick="login()">
        Login
    </button>

    <p id="message"></p>

</div>

<script>

async function login(){

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    const response = await fetch("/login", {

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            email,
            password
        })

    });

    const data = await response.json();

    document.getElementById("message")
    .innerText = data.message;

    if(data.token){

        localStorage.setItem(
            "token",
            data.token
        );

        document.getElementById("message")
        .innerText = "Login Successful 🚀";

 setTimeout(() => {
    window.location.href = "/dashboard";
}, 1000);   }

}

</script>

</body>
</html>
